services:

  backend:
    build: ./backend
    ports:
      - "8080:8080"      # Dev backend on port 8080
    volumes:
      - ./backend:/app   # Hot reload
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:dev_password@db:5432/collective
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3030,http://127.0.0.1:3000,http://127.0.0.1:3030
      - DEBUG=true
      - SPACES_ENABLED=true
      - SPACES_ENDPOINT=http://minio:9000
      - SPACES_REGION=us-east-1
      - SPACES_BUCKET=pj-media
      - SPACES_ACCESS_KEY=minioadmin
      - SPACES_SECRET_KEY=minioadmin
      - SPACES_PUBLIC_ENDPOINT=http://localhost:9000
      - MEDIA_CDN_BASE_URL=http://localhost:9000/pj-media
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    depends_on:
      - db
      - minio
      - redis

  media-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:dev_password@db:5432/collective
      - SPACES_ENABLED=true
      - SPACES_ENDPOINT=http://minio:9000
      - SPACES_REGION=us-east-1
      - SPACES_BUCKET=pj-media
      - SPACES_ACCESS_KEY=minioadmin
      - SPACES_SECRET_KEY=minioadmin
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - minio
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/pj-media;
      mc anonymous set download local/pj-media/tenants;
      exit 0;
      "

  frontend:
    build: ./frontend
    ports:
      - "3030:3000"        # Direct access on port 3030
    volumes:
      - ./frontend/src:/app/src   # Hot reload
      - ./frontend/public:/app/public
      - /app/node_modules         # Prevent overwriting node_modules
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8080  # Dev API URL
      - CHOKIDAR_USEPOLLING=true  # Enable polling for file changes in Docker
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3030
      
    command: npm start

  

  db:
    image: postgres:13
    ports:
      - "5433:5432"      # Access DB from host tools
    environment:
      - POSTGRES_DB=collective
      - POSTGRES_PASSWORD=dev_password
    volumes:
      - ./db:/var/lib/postgresql/data

  # Optional: Add dev tools
  adminer:
    image: adminer
    ports:
      - "7070:8080"
    depends_on:
      - db

volumes:
  minio_data: