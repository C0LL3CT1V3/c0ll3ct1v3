services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-change_me}@db:5432/collective
      - CORS_ORIGINS=${CORS_ORIGINS:-https://c0ll3ct1v3.xyz,https://www.c0ll3ct1v3.xyz}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  media-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-change_me}@db:5432/collective
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.prod
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
        - REACT_APP_AUTH0_DOMAIN=${REACT_APP_AUTH0_DOMAIN}
        - REACT_APP_AUTH0_CLIENT_ID=${REACT_APP_AUTH0_CLIENT_ID}
        - REACT_APP_AUTH0_AUDIENCE=${REACT_APP_AUTH0_AUDIENCE}
        - REACT_APP_AUTH0_SCOPE=${REACT_APP_AUTH0_SCOPE:-openid profile email}
        - REACT_APP_AUTH0_MFA_ACR=${REACT_APP_AUTH0_MFA_ACR:-http://schemas.openid.net/pape/policies/2007/06/multi-factor}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/ssl:/etc/nginx/ssl  # Mount SSL certificates (for updates without rebuild)
    depends_on:
      - backend

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=collective
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
    volumes:
      - ./db_prod:/var/lib/postgresql/data  # Separate volume for prod